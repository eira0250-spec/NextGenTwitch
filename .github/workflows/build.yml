name: Build Real AE Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # パワーアップ！ 7-Zipを使って確実に解凍する
    - name: Extract SDK with 7zip
      run: |
        $zipFile = Get-ChildItem -Filter *.zip | Select-Object -First 1
        if ($zipFile) {
            Write-Host "Extracting $($zipFile.Name) using 7-Zip... (Super fast!)"
            7z x $zipFile.FullName -oAESDK -y
        } else {
            Write-Error "SDK.zip not found!"
            exit 1
        }

    # 執念の探索！「keleton」という文字が含まれるプロジェクトを絶対に見つける
    - name: Find and Build Skeleton
      run: |
        $projectFile = Get-ChildItem -Path AESDK -Filter *keleton*.vcxproj -Recurse | Select-Object -First 1
        
        if ($projectFile) {
            Write-Host "Found it! Building $($projectFile.FullName)..."
            msbuild $projectFile.FullName /p:Configuration=Release /p:Platform=x64
        } else {
            Write-Host "================ DEBUG INFO ================"
            Write-Host "Skeleton project STILL not found. Let's see what vcxproj files actually exist:"
            Get-ChildItem -Path AESDK -Filter *.vcxproj -Recurse | Select-Object FullName
            exit 1
        }

    - name: Upload Real AEX
      uses: actions/upload-artifact@v4
      with:
        name: Real_Plugin_Test
        path: AESDK/**/*.aex
