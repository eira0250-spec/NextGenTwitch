name: Debug SDK Content

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Inspect ZIP and Extract
      run: |
        $zipFile = Get-ChildItem -Filter *.zip | Select-Object -First 1
        if ($zipFile) {
            Write-Host "【発見！】アップロードされたZIP: $($zipFile.Name)"
            Write-Host "【サイズ】: $($zipFile.Length) バイト"
            
            Write-Host "解凍して中身を調べます..."
            7z x $zipFile.FullName -oAESDK -y > $null
            
            Write-Host "================ ZIPの中身（最初の30個） ================"
            Get-ChildItem -Path AESDK -Recurse | Select-Object FullName | Select-Object -First 30
        } else {
            Write-Error "ZIPファイル自体が見つかりません！アップロードできていないかも？"
            exit 1
        }
