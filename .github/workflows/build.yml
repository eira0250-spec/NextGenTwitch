name: Build Next-Gen Twitch

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Extract Outer ZIP
      run: |
        $zipFile = Get-ChildItem -Filter *.zip | Select-Object -First 1
        Write-Host "一番外側のZIPを解凍します..."
        7z x $zipFile.FullName -oAESDK -y > $null

    - name: Extract Inner Adobe Archive (ZSTD)
      run: |
        $batFile = Get-ChildItem -Path AESDK -Filter extractzstd.bat -Recurse | Select-Object -First 1
        if ($batFile) {
            Write-Host "Adobeの特殊な内箱を発見！専用スクリプトで解凍します..."
            $batDir = Split-Path -Parent $batFile.FullName
            Set-Location -Path $batDir
            cmd.exe /c extractzstd.bat
        } else {
            Write-Error "extractzstd.bat が見つかりません！"
            exit 1
        }

    # 【新規追加】ここでTwitchのコードをSkeletonに上書きハッキングする！
    - name: Hack the Skeleton! (Replace source code)
      run: |
        Set-Location -Path $env:GITHUB_WORKSPACE
        $targetCpp = Get-ChildItem -Path AESDK -Filter Skeleton.cpp -Recurse | Select-Object -First 1
        $targetH = Get-ChildItem -Path AESDK -Filter Skeleton.h -Recurse | Select-Object -First 1
        
        if ($targetCpp -and $targetH) {
            Write-Host "Skeletonのソースコードを発見！Twitchの脳みそを上書きします..."
            Copy-Item -Path "Twitch.cpp" -Destination $targetCpp.FullName -Force
            Copy-Item -Path "Twitch.h" -Destination $targetH.FullName -Force
            Write-Host "ハッキング完了！"
        } else {
            Write-Error "上書き先のSkeletonソースが見つかりません！"
            exit 1
        }

    - name: Build Hacked Plugin
      run: |
        New-Item -ItemType Directory -Force -Path "C:\aex_output"
        $env:AE_PLUGIN_BUILD_DIR = "C:\aex_output"
        
        Set-Location -Path $env:GITHUB_WORKSPACE
        $projectFile = Get-ChildItem -Path AESDK -Filter *keleton*.vcxproj -Recurse | Select-Object -First 1
        
        if ($projectFile) {
            Write-Host "改造された設計図でコンパイルを開始します: $($projectFile.FullName)"
            msbuild $projectFile.FullName /p:Configuration=Release /p:Platform=x64
        } else {
            Write-Error "Skeleton.vcxproj が見つかりません。"
            exit 1
        }

    - name: Upload Next-Gen Twitch AEX
      uses: actions/upload-artifact@v4
      with:
        name: NextGenTwitch_Plugin
        path: "C:/aex_output/**/*.aex"
